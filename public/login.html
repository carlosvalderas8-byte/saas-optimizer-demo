<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Optimizer - Iniciar Sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0a0a1a; color:#e0e0e0; min-height:100vh; display:flex; align-items:center; justify-content:center; background-image:radial-gradient(ellipse at top, #12122a 0%, #0a0a1a 70%); }
.container { background:#12122a; border:1px solid #2a2a4a; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.logo { text-align:center; margin-bottom:30px; }
.logo .icon { font-size:40px; margin-bottom:10px; }
.logo h1 { font-size:24px; font-weight:700; background:linear-gradient(135deg,#00d4ff,#7b2ff7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo p { color:#888; font-size:14px; margin-top:5px; }
.tabs { display:flex; margin-bottom:25px; border-bottom:1px solid #2a2a4a; }
.tab { flex:1; text-align:center; padding:12px; cursor:pointer; color:#888; font-weight:500; font-size:14px; transition:all .2s; border-bottom:2px solid transparent; }
.tab.active { color:#00d4ff; border-bottom-color:#00d4ff; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; margin-bottom:6px; font-size:13px; color:#aaa; font-weight:500; }
.form-group input { width:100%; padding:12px 16px; background:#1a1a35; border:1px solid #2a2a4a; border-radius:8px; color:#fff; font-size:14px; outline:none; transition:border-color .3s; }
.form-group input:focus { border-color:#7b2ff7; }
.btn { width:100%; padding:12px; background:linear-gradient(135deg,#00d4ff,#7b2ff7); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:transform .2s,box-shadow .2s; }
.btn:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(123,47,247,0.3); }
.error { color:#ff4444; font-size:13px; margin-top:10px; text-align:center; display:none; }
.success { color:#00c853; font-size:13px; margin-top:10px; text-align:center; display:none; }
.info { text-align:center; font-size:12px; color:#555; margin-top:20px; padding-top:15px; border-top:1px solid #2a2a4a; }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="icon">📊</div>
    <h1>SaaS Optimizer</h1>
    <p>Gestiona tus suscripciones inteligentemente</p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')" id="tabLogin">Iniciar Sesión</div>
    <div class="tab" onclick="switchTab('register')" id="tabRegister">Registrarse</div>
  </div>
  
  <div class="tab-content active" id="content-login">
    <form onsubmit="return handleLogin(event)">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="tu@email.com" required></div>
      <button type="submit" class="btn" id="loginBtn">Acceder</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>
  
  <div class="tab-content" id="content-register">
    <form onsubmit="return handleRegister(event)">
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="tu@email.com" required></div>
      <div class="form-group"><label>Nombre (opcional)</label><input type="text" id="regName" placeholder="Tu nombre"></div>
      <button type="submit" class="btn" id="regBtn">Crear Cuenta</button>
      <div class="error" id="regError"></div>
    </form>
  </div>
  
  <div class="info">Demo: prueba todas las funciones básicas. Activa la versión FULL desde Ajustes.</div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.getElementById('content-' + tab).classList.add('active');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Entrando...'; error.style.display = 'none';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('loginEmail').value}) });
    const d = await r.json();
    if(d.success) { window.location.href = '/'; }
    else { error.textContent = d.error; error.style.display = 'block'; btn.disabled = false; btn.textContent = 'Acceder'; }
  } catch(e) { error.textContent = 'Error de conexión'; error.style.display = 'block'; btn.disabled = false; btn.textContent = 'Acceder'; }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  const error = document.getElementById('regError');
  btn.disabled = true; btn.textContent = 'Creando...'; error.style.display = 'none';
  try {
    const r = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('regEmail').value, name:document.getElementById('regName').value}) });
    const d = await r.json();
    if(d.success) { window.location.href = '/'; }
    else { error.textContent = d.error; error.style.display = 'block'; btn.disabled = false; btn.textContent = 'Crear Cuenta'; }
  } catch(e) { error.textContent = 'Error de conexión'; error.style.display = 'block'; btn.disabled = false; btn.textContent = 'Crear Cuenta'; }
}
</script>
</body>
</html>
